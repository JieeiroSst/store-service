version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: qr_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: qr_service

  app:
    build: .
    container_name: qr_app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      APP_APP_BASE_URL: http://localhost:8080
      APP_APP_ENV: production
      APP_MONGODB_URI: mongodb://mongo:27017
      APP_MONGODB_DATABASE: qr_service
      APP_SERVER_PORT: "8080"
    depends_on:
      - mongo

volumes:
  mongo_data:
